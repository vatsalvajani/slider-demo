<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Swiper demo</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/css/swiper-bundle.css" rel="stylesheet">
    <link href="assets/css/custom.css" rel="stylesheet">
  </head>
  <body>

    <section class="hero-slider swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <!-- Background Media -->
                    <div class="banner-bg">
                        <img src="assets/images/hero-banner-img.png" alt="">
                    </div>
                <!-- Slide Content -->
                <span class="slider-bg"></span>
                <div class="container">
                    <div class="banner-content">
                        <span class="banner-tag">Lorem IPsum</span>
                        <h1>Megatrend fabcon</h1>
                        <p>Innovative Products Driving Tomorrow's Excellence</p>
                        <a href="#" target="" class="common-cta-btn banner-btn">Our Services</a>
                    </div><!-- .banner-content -->
                </div>
                
            </div><!-- .swiper-slide -->
            <div class="swiper-slide">
                <!-- Background Media -->
                    <div class="banner-bg banner-bg-video">
                        <video class="banner-video" muted playsinline webkit-playsinline autoplay loop preload="auto">
                            <source src="assets/images/demo-video.mp4" type="video/mp4">
                        </video>
                    </div>
                <!-- Slide Content -->
                <span class="slider-bg"></span>
                <div class="container">
                    <div class="banner-content">
                        <span class="banner-tag">Lorem IPsum</span>
                        <h1>Megatrend fabcon</h1>
                        <p>Innovative Products Driving Tomorrow's Excellence</p>
                        <a href="#" target="" class="common-cta-btn banner-btn">Our Services</a>
                    </div><!-- .banner-content -->
                </div>
                
            </div><!-- .swiper-slide -->
        </div><!-- .swiper-wrapper -->
        
        <!-- Navigation arrows -->
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>

        <!-- Pagination dots -->
        <div class="swiper-pagination"></div>
        

    </section><!-- .hero-slider -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/swiper-bundle.js"></script>
    <script src="assets/js/custom.js"></script>
  </body>
</html>
